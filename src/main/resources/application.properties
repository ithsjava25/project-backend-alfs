gg.jte.development-mode=true
spring.application.name=alfs

#Disable whitelabel
spring.web.error.whitelabel.enabled=false

# Storage (MinIO/S3) ? default local dev values; override via env in andra milj�er
storage.s3.endpoint=http://localhost:9000
storage.s3.accessKey=minioadmin
storage.s3.secretKey=minioadmin
storage.s3.bucket=alfs-attachments
storage.s3.region=us-east-1
storage.s3.secure=false

# Multipart upload limits (kan justeras vid behov)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
# H2 DATABASE CONFIG
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 CONSOLE
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update


